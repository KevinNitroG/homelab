[env]
_.file = ".env.yaml"
SOPS_AGE_KEY_FILE = "./secret/age.agekey"

[settings]
sops = { age_key_file = "./secret/age.agekey" }

# Renovate cannot track will mark as # !R

[tools]
"github:cloudnative-pg/cloudnative-pg" = "1.29.1"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:cert-manager/cmctl" = "2.5.0"                                         # !R
flux2 = "2.8.7"
gh = "2.92.0"                                                               # !R
kustomize = "5.8.1"
sops = "3.13.0"
terraform = "1.15.3"
uv = "0.11.14"
"github:istio/istio" = { version = "1.29.2", asset_pattern = "istioctl-*" }

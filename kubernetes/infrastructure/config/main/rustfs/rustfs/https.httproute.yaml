---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-https
spec:
  parentRefs:
     - name: default
       namespace: istio-system
       kind: Gateway
       sectionName: https
     - name: default
       namespace: istio-system
       kind: Gateway
       sectionName: https-local
  hostnames:
    - rustfs.${LOCAL_DOMAIN}
    - rustfs.${PUBLIC_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rustfs
          port: 9001

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-endpoint
spec:
  parentRefs:
     - name: default
       namespace: istio-system
       kind: Gateway
       sectionName: endpoint
     - name: default
       namespace: istio-system
       kind: Gateway
       sectionName: endpoint-local
  hostnames:
    - rustfs.${LOCAL_DOMAIN}
    - rustfs.${PUBLIC_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rustfs
          port: 9000

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redpanda-https
spec:
  parentRefs:
    - name: default
      namespace: istio-system
      kind: Gateway
      sectionName: https-wildcard
    - name: default
      namespace: istio-system
      kind: Gateway
      sectionName: https-wildcard-local
  hostnames:
    - redpanda.${LOCAL_DOMAIN}
    - redpanda.${PUBLIC_DOMAIN}
  rules:
    - backendRefs:
        - name: redpanda-console
          port: 8080

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-https
spec:
  parentRefs:
    - name: authentik-public
      sectionName: https
      kind: ListenerSet
    - name: authentik-local
      sectionName: https
      kind: ListenerSet
  hostnames:
    - authentik.${PUBLIC_DOMAIN}
    - authentik.${LOCAL_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: authentik-server
          port: 80

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-http
spec:
  parentRefs:
     - name: authentik-public
       sectionName: http
       kind: ListenerSet
     - name: authentik-local
       sectionName: http
       kind: ListenerSet
  hostnames:
    - authentik.${PUBLIC_DOMAIN}
    - authentik.${LOCAL_DOMAIN}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name istiod
spec:
  dependsOn:
    - name: base
  interval: 12h
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: *name
  valuesFrom:
    - kind: ConfigMap
      name: istiod-helm-values

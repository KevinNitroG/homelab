---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name redpanda
spec:
  interval: 12h
  timeout: 1m
  chart:
    spec:
      chart: *name
      sourceRef:
        kind: HelmRepository
        name: *name
      version: 26.1.6
  install:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: redpanda-helm-values

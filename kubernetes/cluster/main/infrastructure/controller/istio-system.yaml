---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controller-istio-system
spec:
  interval: 12h
  retryInterval: 1m
  timeout: 2m # Increase because istio quite take some time
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: kubernetes/infrastructure/controller/main/istio-system/
  dependsOn:
    - name: infrastructure-controller-gatewayapi

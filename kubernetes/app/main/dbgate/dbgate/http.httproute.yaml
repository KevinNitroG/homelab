---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dbgate-http
spec:
  parentRefs:
    - name: dbgate-public
      sectionName: http
      kind: ListenerSet
    - name: dbgate-local
      sectionName: http
      kind: ListenerSet
  hostnames:
    - dbgate.${PUBLIC_DOMAIN}
    - dbgate.${LOCAL_DOMAIN}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
